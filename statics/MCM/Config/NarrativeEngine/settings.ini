; NarrativeEngine — MCM Helper default seed values.
;
; MCM Helper reads this file to seed initial values before the player
; interacts with the MCM page. Live values are written to
; Data/MCM/Settings/NarrativeEngine.ini (which MCM Helper creates and
; maintains). Keys here must match the "id" fields in config.json.
;
; The Settings tab in the PrismaUI dashboard also writes to that same
; runtime file, so the two surfaces share one persistence layer. The
; seed file below only enumerates the keys the UI can edit — the
; universal read cascade (see Data/SKSE/Plugins/NarrativeEngine.ini)
; allows any Config field to be overridden by naming its key in the
; runtime file, whether or not it's seeded here.
;
; Defaults match include/Settings.h's Config baked-in defaults so a
; first-time open of the page shows the same binding the plugin INI
; has been enforcing.

[General]
bDebugMode=0

[Director]
bTickEnabled=1
iTickIntervalSeconds=90
iMinPhaseDurationSeconds=30
iIdealDurationExposition=330
iIdealDurationRisingAction=225
iIdealDurationClimax=90
iIdealDurationFallingAction=225
iIdealDurationResolution=330

[Dashboard]
iHotkeyDXSC=65
bHotkeyShift=0
bHotkeyCtrl=0
bHotkeyAlt=0
