; NarrativeEngine — plugin author / tester INI
;
; Lives at Data/SKSE/Plugins/NarrativeEngine.ini at runtime. Every key below
; can be omitted; the plugin falls back to the baked-in defaults in
; include/Settings.h.
;
; MCM-managed values (the dashboard hotkey) are *overridden* by
; Data/MCM/Settings/NarrativeEngine.ini at runtime if MCM Helper is installed
; and the player has interacted with the MCM page.

[General]
; Debug-level logging on/off (0/1). When ON, the plugin emits an extra
; "Settings: debug mode ON" line at load, and other subsystems may emit
; their own per-tick / per-event debug lines.
bDebugMode=1

[Director]
; Wall-clock seconds between Director evaluations (the tick interval).
; TEMP: shortened from 90 to 30 for development iteration; revert before ship.
iTickIntervalSeconds=30
; Persistent decision-log ring buffer cap.
iDecisionLogMaxEntries=200
; Number of recent decisions fed into the LLM prompt context per tick.
iDecisionLogTailSizeForPrompt=10
; Number of recent SkyrimNet events fed into the LLM prompt context per tick
; (passed as maxCount to PublicGetRecentEvents).
iSkyrimNetEventTailSizeForPrompt=40

[AlphaCanon]
; Comma-separated list of cell EditorIDs the Director will not act in.
; Empty by default. Example: WhiterunDragonsreach,RiftenJarlsLongHouse
sDoNotDisturbCellEDIDsCSV=

[Dashboard]
; Windows virtual-key code for the dashboard toggle. 119 = VK_F8.
; Set to -1 to disable the hotkey entirely.
iHotkeyVK=119
; Modifier bitmask: 1=Ctrl, 2=Shift, 4=Alt. Combinable, exact-match.
;   0 = no modifier required
;   3 = Ctrl+Shift
;   5 = Ctrl+Alt
;   7 = Ctrl+Shift+Alt
iHotkeyModifiers=0
