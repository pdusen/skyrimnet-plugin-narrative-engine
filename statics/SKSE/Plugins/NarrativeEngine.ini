; NarrativeEngine — plugin author / tester INI
;
; Lives at Data/SKSE/Plugins/NarrativeEngine.ini at runtime. Every key below
; can be omitted; the plugin falls back to the baked-in defaults in
; include/Settings.h.
;
; MCM-managed values (the dashboard hotkey) are *overridden* by
; Data/MCM/Settings/NarrativeEngine.ini at runtime if MCM Helper is installed
; and the player has interacted with the MCM page.

[General]
; Debug-level logging on/off (0/1). When ON, the plugin emits an extra
; "Settings: debug mode ON" line at load, and other subsystems may emit
; their own per-tick / per-event debug lines.
bDebugMode=1

[Director]
; Wall-clock seconds between Director evaluations (the tick interval).
; TEMP: shortened from 90 to 30 for development iteration; revert before ship.
iTickIntervalSeconds=30
; Persistent decision-log ring buffer cap.
iDecisionLogMaxEntries=200
; Number of recent decisions fed into the LLM prompt context per tick.
iDecisionLogTailSizeForPrompt=10
; Number of recent SkyrimNet events fed into the LLM prompt context per tick
; (passed as maxCount to PublicGetRecentEvents).
iSkyrimNetEventTailSizeForPrompt=40
; Per-current-phase tension thresholds (0..100) that drive Freytag-pyramid
; advancement. The LLM returns only a tension score; the system advances when
; the score crosses the threshold for the *current* phase. Each transition
; is either a "rises above" or "drops below" gate matching that phase's
; dramatic shape.
;   Exposition    -> RisingAction  when score >= iAdvanceThresholdExposition
;   RisingAction  -> Climax        when score >= iAdvanceThresholdRisingAction
;   Climax        -> FallingAction when score <= iAdvanceThresholdClimax
;   FallingAction -> Resolution    when score <= iAdvanceThresholdFallingAction
;   Resolution    -> Exposition    when score >= iAdvanceThresholdResolution
iAdvanceThresholdExposition=45
iAdvanceThresholdRisingAction=80
iAdvanceThresholdClimax=60
iAdvanceThresholdFallingAction=30
iAdvanceThresholdResolution=25
; Per-phase ideal durations (unpaused real-time seconds). The ActionDispatcher
; only considers firing an action after the current phase has overstayed its
; ideal duration. Total ideal cycle at defaults: 1200s (20 min).
iIdealDurationExposition=330
iIdealDurationRisingAction=225
iIdealDurationClimax=90
iIdealDurationFallingAction=225
iIdealDurationResolution=330
; ActionDispatcher knobs.
;   iActionCooldownSeconds         — wall-clock seconds after an action's
;                                    completion before another may fire.
;   iActionRepetitionWindowSeconds — window during which the same action
;                                    name is excluded from candidate picks.
;                                    Wider than the cooldown so the SAME
;                                    action can't fire back-to-back even
;                                    after the cooldown clears.
;   iActionStaleLockTimeoutSeconds — auto-clear an in-flight action that
;                                    never sends its completion ModEvent.
iActionCooldownSeconds=120
iActionRepetitionWindowSeconds=300
iActionStaleLockTimeoutSeconds=900
; NPCLetterAction precondition: minimum number of recently-engaged NPCs
; SkyrimNet must report before the letter action becomes available. Below
; this floor the LLM would have too thin a sender pool to author a credible
; letter, so the action declines and the dispatcher falls back to other picks.
iLetterMinSenderCandidates=3

[AlphaCanon]
; Comma-separated list of cell EditorIDs the Director will not act in.
; Empty by default. Example: WhiterunDragonsreach,RiftenJarlsLongHouse
sDoNotDisturbCellEDIDsCSV=

[Dashboard]
; Windows virtual-key code for the dashboard toggle. 118 = VK_F7.
; Set to -1 to disable the hotkey entirely.
iHotkeyVK=118
; Modifier bitmask: 1=Ctrl, 2=Shift, 4=Alt. Combinable, exact-match.
;   0 = no modifier required
;   3 = Ctrl+Shift
;   5 = Ctrl+Alt
;   7 = Ctrl+Shift+Alt
iHotkeyModifiers=0

[Actions]
; AmbushAction parameter defaults + clamps. The LLM may supply bandit_count
; and spawn_distance_units in its action-select response; the action validates
; against these bounds, falling back to the default when out of range or
; missing.
iAmbushDefaultBanditCount=3
iAmbushDefaultSpawnDistanceUnits=2000
iAmbushMinBanditCount=2
iAmbushMaxBanditCount=4
iAmbushMinSpawnDistanceUnits=1500
iAmbushMaxSpawnDistanceUnits=3000
; Per-action cooldown applied after a successful ambush, in *in-game hours*
; (stacks on top of the global iActionCooldownSeconds). Persists across
; save/load via the action's own co-save record. 0 disables.
iAmbushPerActionCooldownGameHours=24

; NPCLetterAction / LetterPool knobs.
;   iLetterContentMinWords / iLetterContentMaxWords — bounds enforced on the
;       LLM-generated letter body. Responses outside these bounds are treated
;       as a content-LLM failure and the action is rolled back.
;   iLetterPoolSize                                  — informational; the actual
;       pool size is fixed by the 20 _ne_PooledLetterNN forms in the ESP.
;   iLetterDispatchVerifyDelaySeconds                — wall-clock grace window
;       after Start before DetectAndRollbackFailedStart gives up if the letter
;       still isn't in the vanilla courier's inventory. The dispatch is
;       fire-and-forget so this poll is our only correctness signal.
;   iLetterPendingDeliveryTimeoutSeconds             — co-save reconciliation
;       gate: a slot found in PendingDelivery on load whose deliveredAt
;       (queued-with-courier time) is older than this is demoted to Free,
;       since the vanilla courier system has almost certainly advanced past
;       this entry already.
;   iLetterActionCooldownGameHours                   — in-game hours the
;       npc_letter action is blocked from IsAvailable after a successful
;       dispatch reaches the vanilla courier container. Independent of
;       (and additive to) the global iActionCooldownSeconds real-time
;       cooldown. 0 disables.
;   iLetterSenderCooldownGameHours                   — in-game hours a
;       given sender NPC is excluded from LetterComposer's candidate
;       pool after the courier successfully hands the player a letter
;       from them. Prevents "three letters from the same NPC in one
;       session" repetition. 0 disables the filter.
;   fLetterMemoryImportanceThreshold                 — minimum SkyrimNet
;       `importance_score` (0.0–1.0) a memory must have to be surfaced
;       in the sender's memory tail. Memories below this floor never
;       reach the action-select or compose prompts. Raise to filter
;       harder toward significant moments; lower to include lighter
;       context. Set to 0.0 to disable the filter.
iLetterContentMinWords=60
iLetterContentMaxWords=180
fLetterMemoryImportanceThreshold=0.4
iLetterPoolSize=20
iLetterDispatchVerifyDelaySeconds=5
iLetterPendingDeliveryTimeoutSeconds=600
iLetterActionCooldownGameHours=24
iLetterSenderCooldownGameHours=72

[LetterPool]
; Verbosity for slot-recycling log lines.
;   0 — silent
;   1 — log evictions (slot index, prior state, reason)  [default]
;   2 — log every state transition (Free / PendingDelivery / InInventory /
;       Read / Discarded) plus the eviction cleanup operations
iLetterPoolEvictionLogVerbosity=1
