; NarrativeEngine — plugin author / tester INI
;
; Lives at Data/SKSE/Plugins/NarrativeEngine.ini at runtime. Every key
; below can be omitted; the plugin falls back to the baked-in defaults
; in include/Settings.h.
;
; Universal MCM override cascade (Phase 08+): every key in this file
; can be overridden by naming the same key (same section, same name)
; in Data/MCM/Settings/NarrativeEngine.ini. The dashboard Settings tab
; and the MCM page both write to that file. Any key not present in the
; MCM INI falls through to the plugin-INI value below; the plugin INI
; itself is never written to by the plugin.
;
; A modder or advanced player who wants to override a specific knob at
; runtime (say, iBeatCooldownSeconds) can hand-edit the MCM INI and the
; plugin honors it on the next boot — even for the fifty-plus knobs
; that no UI surface edits. This file remains the on-disk source of
; truth for author defaults; the MCM INI is the on-disk source of
; truth for player-visible overrides.
;
; The MCM INI is also re-read live whenever the player changes a value
; in the MCM page (via the "_ne_DashboardHotkeyChanged" ModEvent fired
; by _ne_MCM.psc — the ModEvent name is legacy from Phase 07; the sink
; re-applies every recognized key, not just the hotkey).

[General]
; Debug-level logging on/off (0/1). When ON, the plugin emits an extra
; "Settings: debug mode ON" line at load, and other subsystems may emit
; their own per-tick / per-event debug lines.
bDebugMode=1

[BeatSystem]
; Master poll cadence for the Narrative Beat System's worker thread, in
; milliseconds. Every 250ms the poll wakes, reads the pause/combat/dialogue
; gates, ticks the global cooldown counter (if idle), and calls into the
; running beat's Tick (if a beat is in flight). See
; docs/implementation/PHASE_06_BEAT_SYSTEM_REFACTOR.md.
iBeatSystemPollIntervalMs=250

; Beat dispatch knobs.
;   iBeatCooldownSeconds         — wall-clock seconds after a beat's
;                                  completion before another may fire.
;   iBeatRepetitionWindowSeconds — window during which the same beat name
;                                  is excluded from candidate picks. Wider
;                                  than the cooldown so the SAME beat
;                                  can't fire back-to-back even after the
;                                  cooldown clears.
iBeatCooldownSeconds=120
iBeatRepetitionWindowSeconds=300

[Director]
; Wall-clock seconds between Director evaluations (the tick interval).
; TEMP: shortened from 90 to 30 for development iteration; revert before ship.
iTickIntervalSeconds=90
; Runtime killswitch initial state. 1 = tick runs; 0 = tick is
; disabled. The dashboard's Dispatch and Settings tabs can toggle this
; at runtime; either surface writes to the MCM INI so the state
; survives reboot. This key seeds the runtime Tick::g_enabled atomic at
; Tick::Start; the MCM INI override wins over this value on the next
; boot.
bTickEnabled=1
; Minimum dwell in the current phase (unpaused real-time seconds)
; before PhaseTracker::EvaluateAdvance is allowed to transition to the
; next phase. Applies uniformly to every phase — a single floor, not
; per-phase. Distinct from the per-phase iIdealDuration* values below,
; which gate whether the beat system may fire an event to nudge the
; story forward. Raise this if you want longer minimum dwell in each
; phase before advancement is even considered; lower it to make
; tension-driven advancement more responsive.
iMinPhaseDurationSeconds=30
; Persistent decision-log ring buffer cap.
iDecisionLogMaxEntries=200
; Number of recent decisions fed into the LLM prompt context per tick.
iDecisionLogTailSizeForPrompt=10
; Number of recent SkyrimNet events fed into the LLM prompt context per tick
; (passed as maxCount to PublicGetRecentEvents).
iSkyrimNetEventTailSizeForPrompt=40
; Per-current-phase tension thresholds (0..100) that drive Freytag-pyramid
; advancement. The LLM returns only a tension score; the system advances when
; the score crosses the threshold for the *current* phase. Each transition
; is either a "rises above" or "drops below" gate matching that phase's
; dramatic shape.
;   Exposition    -> RisingAction  when score >= iAdvanceThresholdExposition
;   RisingAction  -> Climax        when score >= iAdvanceThresholdRisingAction
;   Climax        -> FallingAction when score <= iAdvanceThresholdClimax
;   FallingAction -> Resolution    when score <= iAdvanceThresholdFallingAction
;   Resolution    -> Exposition    when score >= iAdvanceThresholdResolution
iAdvanceThresholdExposition=45
iAdvanceThresholdRisingAction=80
iAdvanceThresholdClimax=60
iAdvanceThresholdFallingAction=30
iAdvanceThresholdResolution=25
; Per-phase ideal durations (unpaused real-time seconds). The ActionDispatcher
; only considers firing an action after the current phase has overstayed its
; ideal duration. Total ideal cycle at defaults: 1200s (20 min).
iIdealDurationExposition=330
iIdealDurationRisingAction=225
iIdealDurationClimax=90
iIdealDurationFallingAction=225
iIdealDurationResolution=330

; NPCLetterAction precondition: minimum number of recently-engaged NPCs
; SkyrimNet must report before the letter action becomes available. Below
; this floor the LLM would have too thin a sender pool to author a credible
; letter, so the action declines and the dispatcher falls back to other picks.
iLetterMinSenderCandidates=3

; NPCVisitAction precondition: minimum number of viable sender candidates
; required for IsAvailable to return true. Below this, the action declines
; and the dispatcher considers other picks. Same shape as the letter
; equivalent, but the visit's viability filter is stricter (unique NPCs,
; not in combat, not the player's follower, etc.), so the practical pool
; is smaller than letters would see for the same engagement history.
iVisitMinSenderCandidates=3

[AlphaCanon]
; Comma-separated list of cell EditorIDs the Director will not act in.
; Empty by default. Example: WhiterunDragonsreach,RiftenJarlsLongHouse
sDoNotDisturbCellEDIDsCSV=

[Dashboard]
; DirectX scan code for the dashboard toggle. 65 = DIK_F7. Scan-code
; space is the native input space of SKSE's button events and MCM
; Helper's keymap sink, so an MCM-written value lands here directly
; without translation. A few common codes:
;   1  = Escape        16 = Q            30 = A
;   28 = Enter         17 = W            31 = S
;   57 = Space         18 = E            32 = D
;   59-68 = F1..F10    43 = Backslash    41 = Grave (`)
; Set to -1 to disable the hotkey entirely.
iHotkeyDXSC=65
; Modifier bitmask: 1=Shift, 2=Ctrl, 4=Alt. Combinable, exact-match.
; Bit assignment matches SkyUI convention so values written by the MCM
; page (via ModEvent) land here unchanged.
;   0 = no modifier required
;   3 = Shift+Ctrl
;   5 = Shift+Alt
;   6 = Ctrl+Alt
;   7 = Shift+Ctrl+Alt
iHotkeyModifiers=2

[WeatherEvents]
; NarrativeEngine-owned weather event source. Polls RE::Sky on a
; throttled cadence, emits weather_event entries into recent_events
; when the weather category (pleasant / cloudy / rainy / snowy, and a
; derived stormy bit) changes. Fills the gap SkyrimNet's event log
; leaves around ambient weather.
;
;   iWeatherEventsMaxStored           — ring-buffer cap on retained
;                                       internal events.
;   iWeatherEventPollIntervalSeconds  — minimum real seconds between
;                                       Sky samples. Weather updates
;                                       on the order of tens of
;                                       seconds; sampling every Tick
;                                       (500ms) would waste work
;                                       without new signal.
;   iWeatherEventDebounceSeconds      — minimum real seconds between
;                                       emitted events, applied on top
;                                       of the poll interval to
;                                       suppress rapid oscillation.
iWeatherEventsMaxStored=128
iWeatherEventPollIntervalSeconds=30
iWeatherEventDebounceSeconds=20

[TravelEvents]
; NarrativeEngine-owned travel event source. Polls player location
; and hold-region on every unpaused Tick, emits travel_event entries
; on transitions (entered/left named locations, crossed hold
; boundaries, entered wilderness, fast-travelled). Interior<->
; interior transitions are suppressed; interior<->exterior fire.
;
;   iTravelEventsMaxStored             — ring-buffer cap on retained
;                                        internal events.
;   iTravelCondensationWindowSeconds   — max inter-event gap within a
;                                        condensable run. Runs whose
;                                        events fall inside this
;                                        window collapse in the
;                                        rendered tail: net-zero runs
;                                        drop entirely or fold to a
;                                        "visited X" summary; non-zero
;                                        runs fold to a "travelled A
;                                        to B" summary.
;   iTravelFollowerRadiusUnits         — follower inclusion distance.
;                                        Any alive PlayerTeammate
;                                        within this radius at
;                                        emission time gets baked
;                                        into the event's party name
;                                        list. ~4000 units ≈ 60 ft.
iTravelEventsMaxStored=128
iTravelCondensationWindowSeconds=60
iTravelFollowerRadiusUnits=4000

[HoldGrid]
; Debug: dump one 24-bit BMP per worldspace to the SKSE log directory
; after HoldGrid finishes its BFS partition. Each hold gets a distinct
; color; seeded cells (locations that chained to LocTypeHold on their
; own) are black; unassigned cells are white. Overwrites existing
; files each session start. Disabled by default — flip to true only
; when auditing fill quality.
bHoldGridDebugBitmap=false
; Between seed collection and BFS, drop small seed clusters that are
; geographically far from the rest of their hold's seeds. Filters
; vanilla mis-authored strays that would otherwise seed a bad fill
; front. Setting either value to 0 disables the pass.
;
;   iHoldGridPruneMaxClusterSize   — K. Only same-hold seed clusters
;                                    (via 4-neighbor adjacency on the
;                                    seed set) of size <= K are
;                                    candidates for pruning. Default 3.
;   iHoldGridPruneIsolationRadius  — R. A candidate cluster is kept if
;                                    any same-hold seed OUTSIDE the
;                                    cluster lies within Manhattan
;                                    distance R of any cell in the
;                                    cluster; dropped otherwise.
;                                    Default 5 — empirically tuned
;                                    against vanilla Skyrim.
iHoldGridPruneMaxClusterSize=3
iHoldGridPruneIsolationRadius=5

[EventHistory]
; Testing aid: writes every emitted internal event (combat + weather
; + travel) plus SkyrimNet's own event stream to a running history
; file at Data/../SKSE/NarrativeEngine_EventHistory.log. Each line
; is prefixed with an absolute in-game timestamp (not the "[N ago]"
; relative form the LLM sees). Session boundaries rotate the file:
; current -> .1 -> .2 -> ... -> .5 (deleted). Keeps the previous 5.
;
;   bEventHistoryEnabled               — master switch. When false
;                                        (default), the file is never
;                                        opened AND each event log
;                                        skips its per-emit push to
;                                        the pending queue (so the
;                                        queue can't grow unbounded
;                                        on a long session with the
;                                        writer off). Flip to true
;                                        for Step 9 testing.
;   iEventHistoryFlushIntervalSeconds  — unpaused real seconds
;                                        between file flushes.
;                                        Weather/travel events emit
;                                        slowly; 5s trades off write
;                                        frequency vs. how long
;                                        events sit in pending queues.
bEventHistoryEnabled=false
iEventHistoryFlushIntervalSeconds=5

[Beats]
; Per-beat enable defaults. Seeded into the runtime registry at kDataLoaded
; and surfaced as toggles on the dashboard's Dispatch tab for isolation
; testing. Runtime toggles do NOT write back to this file — the INI is the
; source of truth every time the game boots. Set to false to force the
; Director's candidate list to exclude the beat outright.
bEnableAmbush=true
bEnableNpcLetter=true

; Ambush parameter defaults + clamps. The LLM may supply bandit_count
; and spawn_distance_units in its beat-select response; the beat validates
; against these bounds, falling back to the default when out of range or
; missing.
iAmbushDefaultBanditCount=3
iAmbushDefaultSpawnDistanceUnits=2000
iAmbushMinBanditCount=2
iAmbushMaxBanditCount=4
iAmbushMinSpawnDistanceUnits=1500
iAmbushMaxSpawnDistanceUnits=3000
; Per-beat cooldown applied after a successful ambush, in *in-game hours*
; (stacks on top of the global iBeatCooldownSeconds). Persists across
; save/load via the beat's own co-save record. 0 disables.
iAmbushPerBeatCooldownGameHours=24

; NPC-letter beat / LetterPool knobs.
;   iLetterContentMinWords / iLetterContentMaxWords — bounds enforced on the
;       LLM-generated letter body. Responses outside these bounds are treated
;       as a content-LLM failure and the beat is rolled back.
;   iLetterPoolSize                                  — informational; the actual
;       pool size is fixed by the 20 _ne_PooledLetterNN forms in the ESP.
;   iLetterDispatchVerifyDelaySeconds                — wall-clock grace window
;       after start before dispatch-verification gives up if the letter
;       still isn't in the vanilla courier's inventory. The dispatch is
;       fire-and-forget so this poll is our only correctness signal.
;   iLetterPendingDeliveryTimeoutSeconds             — co-save reconciliation
;       gate: a slot found in PendingDelivery on load whose deliveredAt
;       (queued-with-courier time) is older than this is demoted to Free,
;       since the vanilla courier system has almost certainly advanced past
;       this entry already.
;   iLetterBeatCooldownGameHours                     — in-game hours the
;       npc_letter beat is blocked from IsAvailable after a successful
;       dispatch reaches the vanilla courier container. Independent of
;       (and additive to) the global iBeatCooldownSeconds real-time
;       cooldown. 0 disables.
;   iLetterSenderCooldownGameHours                   — in-game hours a
;       given sender NPC is excluded from LetterComposer's candidate
;       pool after the courier successfully hands the player a letter
;       from them. Prevents "three letters from the same NPC in one
;       session" repetition. 0 disables the filter.
;   fLetterMemoryImportanceThreshold                 — minimum SkyrimNet
;       `importance_score` (0.0–1.0) a memory must have to be surfaced
;       in the sender's memory tail. Memories below this floor never
;       reach the beat-select or compose prompts. Raise to filter
;       harder toward significant moments; lower to include lighter
;       context. Set to 0.0 to disable the filter.
iLetterContentMinWords=60
iLetterContentMaxWords=150
fLetterMemoryImportanceThreshold=0.4
iLetterPoolSize=20
iLetterDispatchVerifyDelaySeconds=5
iLetterPendingDeliveryTimeoutSeconds=600
iLetterBeatCooldownGameHours=24
iLetterSenderCooldownGameHours=72

[LetterPool]
; Verbosity for slot-recycling log lines.
;   0 — silent
;   1 — log evictions (slot index, prior state, reason)  [default]
;   2 — log every state transition (Free / PendingDelivery / InInventory /
;       Read / Discarded) plus the eviction cleanup operations
iLetterPoolEvictionLogVerbosity=1

; ---- NPC-visit beat (Phase 05) settings (in [Beats] section) ----
;
; The [Beats] section above continues here — these keys were added in
; Phase 05 for the visit beat. Sub-grouped by function.

[Beats]
; Whether the visit action is registered with the dispatcher. Runtime
; dashboard toggles override this per-session but never write back.
bEnableNpcVisit=true

; --- Composition ---
;   iVisitBriefingMinWords / iVisitBriefingMaxWords — bounds on the LLM's
;       generated briefing. Responses outside are treated as a compose
;       failure and the action rolls back.
;   iVisitMarkerMinDistanceUnits / iVisitMarkerMaxDistanceUnits — distance
;       band the SpawnMarker FMR alias picks XMarkers within, relative to
;       the player. Baked into the CK-authored FMR conditions on the
;       SpawnMarker alias; changing these at runtime does NOT retroactively
;       update the alias behavior (documented here for reference).
iVisitBriefingMinWords=40
iVisitBriefingMaxWords=120
iVisitMarkerMinDistanceUnits=800
iVisitMarkerMaxDistanceUnits=2500

; --- Cooldowns ---
;   iVisitSenderCooldownGameHours — per-sender cooldown in in-game hours,
;       stamped when a visit's Salutation → Discuss transition fires. That
;       NPC is filtered out of the visit candidate pool for this many
;       in-game hours to prevent them from being picked again immediately.
;       0 disables the filter. Persists per-sender-FormID in the action's
;       co-save record.
iVisitSenderCooldownGameHours=72

; --- State machine timing ---
;   iVisitApproachTimeoutSeconds — Salutation timeout. If the sender hasn't
;       walked close enough to speak the opening line within this many
;       seconds, the action rolls back and the sender is teleported home.
;   iVisitSalutationApproachDistanceUnits — distance at which the Salutation
;       opening line fires and the state machine advances to Discuss.
;   iVisitReEngageApproachDistanceUnits — after On-Hold clears, the sender
;       must close within this distance again for the resumption line to
;       fire. Slightly larger than Salutation so a walking player doesn't
;       fight the sender's Follow package.
iVisitApproachTimeoutSeconds=60
iVisitSalutationApproachDistanceUnits=900
iVisitReEngageApproachDistanceUnits=1000

; --- Discuss-phase natural-conclusion poll (cheap-signal-gated) ---
;   iVisitPollGateTickSeconds — wall-clock cadence at which the plugin
;       evaluates the three cheap-signal gates that decide whether to fire
;       the LLM poll. Cheap by design: three integer/timestamp comparisons
;       per tick.
;   iVisitPollTurnCountThreshold — speech turns observed since the last
;       poll before a poll fires. Rough proxy for ~30 real sec of active
;       exchange at typical pacing.
;   iVisitPollSilenceRealSeconds — real seconds of silence since the last
;       observed speech turn before a poll fires. Accumulation pauses while
;       the game is paused (RE::UI::GameIsPaused — journal / inventory /
;       map / load screens), so this measures actual "the player has been
;       looking at the sender doing nothing" time, independent of the
;       user's iTimescale. Also doubles as the "silence exceeded -> fire
;       ContinueConversation" threshold when the poll returns not-concluded.
;   iVisitPollMaxIntervalGameMinutes — in-game minutes since the last poll
;       before a poll fires as a safety ceiling. Guarantees the LLM verdict
;       refreshes even during a productive back-and-forth that never trips
;       the other gates. Same in-game-time measurement.
;   iVisitConclusionPollMaxConsecutiveFailures — consecutive poll failures
;       (parse errors / LLM errors) before hard-abort. Prevents the visit
;       from running indefinitely on a broken poll.
;   iVisitMaxIgnoreNudges — consecutive ContinueConversation fires without
;       a poll ever returning "concluded" in between. On this cap, the
;       plugin forces Valediction with elevated nudge_count in the args so
;       the closing line reads as a frustrated exit.
iVisitPollGateTickSeconds=1
iVisitPollTurnCountThreshold=4
iVisitPollSilenceRealSeconds=120
iVisitPollMaxIntervalGameMinutes=10
iVisitConclusionPollMaxConsecutiveFailures=6
iVisitMaxIgnoreNudges=3

; --- Other timeouts / dwells ---
;   iVisitOnHoldCombatMaxSeconds — how long On-Hold may persist while
;       combat is the trigger before hard-abort. Combat-driven On-Hold has
;       a short leash because a fight going long usually means the beat
;       won't recover cleanly.
;   iVisitValedictionDwellSeconds — wall-clock seconds between the
;       Valediction closing line and the ReturnHome transition. Gives the
;       closing line time to play out before the sender turns to leave.
;   iVisitReturnHomeExitDistanceUnits — sender-to-player distance during
;       ReturnHome that triggers the final teleport + shutdown. Offscreen
;       for most gameplay framing.
;   iVisitReturnHomeTimeoutSeconds — outer wall-clock cap on ReturnHome.
;       If the sender is still walking (hasn't hit distance / cell-unload)
;       after this many seconds, teleport anyway.
iVisitOnHoldCombatMaxSeconds=60
iVisitValedictionDwellSeconds=10
iVisitReturnHomeExitDistanceUnits=8000
iVisitReturnHomeTimeoutSeconds=300
