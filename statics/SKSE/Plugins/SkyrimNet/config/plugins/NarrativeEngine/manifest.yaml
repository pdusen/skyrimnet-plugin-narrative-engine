# NarrativeEngine — SkyrimNet plugin manifest.
#
# SkyrimNet auto-discovers plugin folders under
# `Data/SKSE/Plugins/SkyrimNet/config/plugins/<plugin>/` and ingests this
# file. Two purposes:
#
#   1. `variants:` declares named LLM-config profiles. When our C++ side
#      calls `SendCustomPromptToLLM(promptName, variantName, ctx, cb)`,
#      SkyrimNet picks the LLM config for that variant — base SkyrimNet
#      config with any overrides the user has set for this plugin
#      layered on top. Without a variant entry, the call falls back to
#      SkyrimNet's default Dialogue LLM.
#
#      NarrativeEngine declares two variants:
#
#        - narrative_engine_director  — structured-JSON decision work
#                                       (per-tick tension eval, action select).
#                                       A small, cheap, low-temperature model
#                                       is usually the right pick.
#        - narrative_engine_composer  — creative writing in a specific NPC's
#                                       voice (letter composition today). The
#                                       task shape matches SkyrimNet dialogue,
#                                       so the base dialogue model is a
#                                       sensible default.
#
#   2. `schema.fields:` declares plugin settings that SkyrimNet exposes in
#      its in-game UI. Override categories below are named per-variant so
#      the user can tune each independently.

plugin:
  name: NarrativeEngine
  version: "0.0.1"
  description: "AI Director for Skyrim, layered on top of SkyrimNet — judges story-arc pacing per real-time tick."

variants:
  - name: narrative_engine_director
    description: "The Narrative Director — per-tick Freytag-pyramid phase + tension evaluation and action-select decisions. Structured-JSON classification work; benefits from a small, cheap, low-temperature model. Uses base SkyrimNet config unless overridden in 'Director LLM Overrides' below."

  - name: narrative_engine_composer
    description: "The Narrative Composer — creative writing in a specific NPC's voice (letter composition today; future in-voice prompts will reuse this same variant). Shape matches SkyrimNet dialogue generation, so the base dialogue model is a sensible default. Uses base SkyrimNet config unless overridden in 'Composer LLM Overrides' below."

schema:
  fields:
    # ── Director LLM Overrides ────────────────────────────────────────────
    # Leave all of these empty / 0 to use SkyrimNet's base config. Anything
    # non-empty / non-zero overrides the corresponding base field when the
    # `narrative_engine_director` variant is invoked.

    - name: "API Endpoint"
      path: "llm.endpoint"
      type: "string"
      description: "Custom API endpoint URL (e.g., http://localhost:5000/v1, or a different OpenAI-compatible provider). Leave empty to use SkyrimNet's base endpoint."
      defaultValue: ""
      category: "Director LLM Overrides"

    - name: "API Key"
      path: "llm.api_key"
      type: "string"
      description: "API key for the custom endpoint. Leave empty to use SkyrimNet's base API key."
      defaultValue: ""
      category: "Director LLM Overrides"

    - name: "Model Override"
      path: "llm.model_name"
      type: "string"
      description: "Override model name for the Director. The Director's task is structured-JSON classification, not creative writing — a small, cheap, fast model is usually the right pick. Leave empty to use the same model as SkyrimNet dialogue."
      defaultValue: "deepseek/deepseek-v4-flash"
      category: "Director LLM Overrides"

    - name: "Temperature Override"
      path: "llm.temperature"
      type: "float"
      description: "Override sampling temperature. Low values (0.1-0.3) give more consistent tension scoring across ticks; higher values let the read drift more. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0.0
      max: 2.0
      category: "Director LLM Overrides"

    - name: "Max Tokens Override"
      path: "llm.max_tokens"
      type: "int"
      description: "Override max response tokens. The Director's response is one small JSON object — 256 is comfortably enough. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0
      max: 4096
      category: "Director LLM Overrides"

    - name: "Timeout Override"
      path: "llm.timeout"
      type: "int"
      description: "Override request timeout in seconds. The Director tolerates slow responses (the worst case is just dropping a tick), so this can be generous. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0
      max: 120
      category: "Director LLM Overrides"

    # ── Composer LLM Overrides ────────────────────────────────────────────
    # Leave all of these empty / 0 to use SkyrimNet's base config. Anything
    # non-empty / non-zero overrides the corresponding base field when the
    # `narrative_engine_composer` variant is invoked.

    - name: "API Endpoint"
      path: "composer_llm.endpoint"
      type: "string"
      description: "Custom API endpoint URL for creative-writing prompts. Leave empty to use SkyrimNet's base endpoint."
      defaultValue: ""
      category: "Composer LLM Overrides"

    - name: "API Key"
      path: "composer_llm.api_key"
      type: "string"
      description: "API key for the custom composer endpoint. Leave empty to use SkyrimNet's base API key."
      defaultValue: ""
      category: "Composer LLM Overrides"

    - name: "Model Override"
      path: "composer_llm.model_name"
      type: "string"
      description: "Override model name for the Composer. The Composer's task is creative writing in a specific NPC's voice — a larger, better-prose model helps here, at the cost of latency. Leave empty to use the same model as SkyrimNet dialogue."
      defaultValue: ""
      category: "Composer LLM Overrides"

    - name: "Temperature Override"
      path: "composer_llm.temperature"
      type: "float"
      description: "Override sampling temperature. Higher values (0.7-1.0) give more expressive, distinctive letter voices; lower values are more predictable. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0.0
      max: 2.0
      category: "Composer LLM Overrides"

    - name: "Max Tokens Override"
      path: "composer_llm.max_tokens"
      type: "int"
      description: "Override max response tokens. A composed letter is at most a few hundred words plus the JSON envelope — 2048 is generous. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0
      max: 4096
      category: "Composer LLM Overrides"

    - name: "Timeout Override"
      path: "composer_llm.timeout"
      type: "int"
      description: "Override request timeout in seconds. Letter composition can be slower than dialogue turns; a generous timeout avoids dropped compositions. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0
      max: 120
      category: "Composer LLM Overrides"
