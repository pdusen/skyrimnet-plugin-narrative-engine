# NarrativeEngine — SkyrimNet plugin manifest.
#
# SkyrimNet auto-discovers plugin folders under
# `Data/SKSE/Plugins/SkyrimNet/config/plugins/<plugin>/` and ingests this
# file. Two purposes:
#
#   1. `variants:` declares named LLM-config profiles. When our C++ side
#      calls `SendCustomPromptToLLM(promptName, variantName, ctx, cb)`,
#      SkyrimNet picks the LLM config for that variant — base SkyrimNet
#      config with any overrides the user has set for this plugin
#      layered on top. Without a variant entry, the call falls back to
#      SkyrimNet's default Dialogue LLM.
#
#      NarrativeEngine declares two variants:
#
#        - narrative_engine_director  — structured-JSON decision work
#                                       (per-tick tension eval, action select).
#                                       A small, cheap, low-temperature model
#                                       is usually the right pick.
#        - narrative_engine_composer  — creative writing in a specific NPC's
#                                       voice (letter composition today). The
#                                       task shape matches SkyrimNet dialogue,
#                                       so the base dialogue model is a
#                                       sensible default.
#
#   2. `schema.fields:` declares plugin settings that SkyrimNet exposes in
#      its in-game UI. Override categories below are named per-variant so
#      the user can tune each independently.

plugin:
  name: NarrativeEngine
  version: "0.2.0"
  description: "AI Director for Skyrim, layered on top of SkyrimNet — judges story-arc pacing per real-time tick."

variants:
  - name: narrative_engine_director
    description: "The Narrative Director — per-tick Freytag-pyramid phase + tension evaluation and action-select decisions. Structured-JSON classification work; benefits from a small, cheap, low-temperature model. Uses base SkyrimNet config unless overridden in 'Director LLM Overrides' below."

  - name: narrative_engine_composer
    description: "The Narrative Composer — creative writing in a specific NPC's voice (letter composition today; future in-voice prompts will reuse this same variant). Shape matches SkyrimNet dialogue generation, so the base dialogue model is a sensible default. Uses base SkyrimNet config unless overridden in 'Composer LLM Overrides' below."

schema:
  fields:
    # ── LLM Overrides for narrative_engine_director variant ──
    # All fields are optional. Empty / 0 = inherit from base OpenRouter config.
    - name: "API Endpoint"
      path: "llm.endpoint"
      type: "string"
      description: "Custom API endpoint URL for background prompts (e.g., http://localhost:5000/v1 for a local model). Leave empty to use the base OpenRouter endpoint."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "API Key"
      path: "llm.api_key"
      type: "string"
      description: "API key for the custom endpoint above. Leave empty to use the base OpenRouter API key."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "Model Name"
      path: "llm.model_name"
      type: "string"
      description: "Override model for background prompts (e.g., 'meta-llama/llama-3.3-70b-instruct' or any OpenRouter model id). Leave empty to use the same model as dialogue. Background prompts run periodically and don't need a top-tier model."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "Temperature"
      path: "llm.temperature"
      type: "float"
      description: "Override sampling temperature for background prompts. Set to 0 to inherit the base config value."
      defaultValue: 0
      min: 0.0
      max: 2.0
      category: "LLM Overrides"

    - name: "Max Tokens"
      path: "llm.max_tokens"
      type: "int"
      description: "Override max response tokens for background prompts. Set to 0 to inherit the base config value."
      defaultValue: 0
      min: 0
      max: 4096
      category: "LLM Overrides"

    - name: "Request Timeout (seconds)"
      path: "llm.timeout"
      type: "int"
      description: "Override request timeout in seconds for background prompts. Set to 0 to inherit the base config value."
      defaultValue: 0
      min: 0
      max: 120
      category: "LLM Overrides"
